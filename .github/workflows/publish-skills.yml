name: Publish Website & Skills to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'skills/**'
      - 'agent-skills/**'
      - 'scripts/build-skill-index.js'
      - 'website/**'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Skills Index
        run: node scripts/build-skill-index.js

      - name: Install Website Dependencies
        working-directory: ./website
        run: npm ci

      - name: Sync skills into website package
        working-directory: ./website
        run: npm run sync-skills

      - name: Build Next.js Website
        working-directory: ./website
        run: npm run build

      - name: Prepare Pages Artifact
        run: |
          # Ensure the published skills JSON and index match the homepage catalog.
          rm -rf website/out/skills
          cp -r skills website/out/skills
          # Preserve agent skill packages for download.
          cp -r agent-skills website/out/
          # Basic smoke checks for the static export shape.
          test -f website/out/index.html
          test -f website/out/docs/index.html
          test -f website/out/skills/index.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
